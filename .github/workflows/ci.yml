name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          find . \( -name '*.sh' -o -name 'bootstrap.sh' -o -name 'smoke-test' \) \
            -not -path './.git/*' \
            | xargs shellcheck --severity=warning

  manifest:
    name: manifest valid JSON
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest/tools.json
        run: |
          if [ ! -f manifest/tools.json ]; then
            echo "manifest/tools.json not found — this is expected on a fresh clone before bootstrap"
            exit 0
          fi
          if ! jq empty manifest/tools.json; then
            echo "manifest/tools.json is not valid JSON"
            exit 1
          fi
          count="$(jq 'length' manifest/tools.json)"
          echo "manifest/tools.json valid — $count entries"
